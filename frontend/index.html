<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>우리사이 밸런스 게임</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      button, input { outline: none; -webkit-tap-highlight-color: transparent; }
      button:focus, button:focus-visible { outline: none; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: #f4f4f4;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }
      #root { min-height: 100dvh; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // React 마운트 전에 딥링크 pathname → hash 변환
      // HashRouter가 올바른 경로에서 시작하도록 보장 (HomePage 렌더 방지)
      (function () {
        var path = window.location.pathname;
        var search = window.location.search;
        if (path && path !== '/' && !window.location.hash) {
          window.location.replace(
            window.location.origin + '/#' + path + search
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
